<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Your Specialist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="selection-screen">
        <h1>Which specialist do you need?</h1>
        <p>Select a category to view available doctors</p>
        
        <div class="doctor-grid">
            <div class="doctor-card">
                <div class="icon">🩺</div>
                <h3>Physician</h3>
                <button class="book-btn">Select</button>
            </div>

            <div class="doctor-card">
                <div class="icon">✨</div>
                <h3>Dermatologist</h3>
                <button class="book-btn">Select</button>
            </div>

            <div class="doctor-card">
                <div class="icon">👩‍⚕️</div>
                <h3>Gynecologist</h3>
                <button class="book-btn">Select</button>
            </div>
        </div>
    </div>
</body>
</html>
